[build]
  command = "mkdir -p dist && npm install"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "@neondatabase/serverless", "ws", "googleapis", "dotenv", "express-rate-limit"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
